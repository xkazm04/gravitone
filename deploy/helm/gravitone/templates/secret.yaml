{{- if not .Values.apiKey.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gravitone.fullname" . }}-key
  labels:
    {{- include "gravitone.labels" . | nindent 4 }}
type: Opaque
stringData:
  TTS_API_KEY: {{ required "set apiKey.value (or apiKey.existingSecret)" .Values.apiKey.value | quote }}
{{- end }}
